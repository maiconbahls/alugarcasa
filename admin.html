<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Painel do Administrador - Lista de Espera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --secondary: #0ea5e9;
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.1);
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    
    body {
      min-height: 100vh;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.15), transparent 20%),
        radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.15), transparent 20%);
      color: var(--text-main);
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .title-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .title-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .title-icon svg {
      width: 24px;
      height: 24px;
      color: white;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(to right, #fff, #cbd5e1);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-label {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .table-container {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid var(--border-color);
      overflow-x: auto;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      min-width: 900px;
    }

    th {
      padding: 16px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 16px;
      font-size: 0.95rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.03);
    }

    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge.success {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .badge.warning {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .badge.error {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .action-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: white;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .action-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .action-btn svg {
      width: 18px;
      height: 18px;
    }

    .refresh-btn {
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(79, 70, 229, 0.4);
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    
    .status-indicator.green { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-indicator.red { background: var(--error); box-shadow: 0 0 8px var(--error); }

    .loader {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-weight: 500;
    }

  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title-area">
        <div class="title-icon">
          <svg xmlns="http://www.w3.org/2007/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
          </svg>
        </div>
        <h1>Painel do Admin - Lista de Espera</h1>
      </div>
      
      <button class="refresh-btn" onclick="carregarDados()">
        <svg xmlns="http://www.w3.org/2007/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Atualizar Dados
      </button>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Total Cadastrados</span>
        <span class="stat-value" id="totalCadastrados">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Aprovados (Renda Suporta)</span>
        <span class="stat-value" id="totalAprovados">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Reprovados (>30% Renda)</span>
        <span class="stat-value" id="totalReprovados">0</span>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Posição</th>
            <th>Data e Hora</th>
            <th>Nome Completo</th>
            <th>Contato</th>
            <th>Renda Bruta</th>
            <th>Análise (< 30%)</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Dados serão inseridos aqui via JavaScript -->
        </tbody>
      </table>
      <div id="loader" class="loader">Carregando dados...</div>
    </div>
  </div>

  <script>
    // URL da API do Google Apps Script (Você pode substituir pela mesma URL que usa para salvar)
    // ATENÇÃO: Para o Google Sheets retornar dados, você deve implementar o método "doGet" na sua planillha.
    // Como demonstração até você plugar, criamos dados mockados super realistas para você ver a interface:
    const DEMO_MODE = true; 

    // Função que formata dinheiro em Reais (BRL)
    const formatoReal = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

    // Função para renderizar os dados na tabela e atualizar os cards de estatísticas
    function renderizarTabela(dados) {
      const tbody = document.getElementById('tableBody');
      const loader = document.getElementById('loader');
      tbody.innerHTML = '';
      
      let aprovados = 0;
      let reprovados = 0;

      if (dados.length === 0) {
        loader.textContent = 'Nenhum cadastro encontrado.';
        return;
      }
      
      loader.style.display = 'none';

      dados.forEach((candidato, index) => {
        const rentaBrt = parseFloat(candidato.renda_bruta);
        const aluguel = parseFloat(candidato.valor_aluguel);
        
        // Regra de 30% da renda:
        const maximoAluguel = rentaBrt * 0.3;
        const passouNaRegra = aluguel <= maximoAluguel;

        if(passouNaRegra) aprovados++; else reprovados++;

        const badgeHtml = passouNaRegra 
          ? `<span class="badge success"><span class="status-indicator green"></span>Aprovado (Dentro da Renda)</span>`
          : `<span class="badge error"><span class="status-indicator red"></span>Reprovado (Excede 30%)</span>`;

        // Cálculo de percentual
        const percentualComprometido = ((aluguel / rentaBrt) * 100).toFixed(1);

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>#${index + 1}</strong></td>
          <td><div style="font-size: 0.85rem; color: #94a3b8;">${candidato.data_cadastro}</div></td>
          <td>
            <strong>${candidato.nome_completo}</strong><br>
            <span style="font-size: 0.8rem; color: #94a3b8;">CPF: ${candidato.cpf} | Profissão: ${candidato.profissao}</span>
          </td>
          <td>
            <div style="display: flex; flex-direction: column; gap: 4px;">
              <a href="https://wa.me/55${candidato.telefone.replace(/\D/g, '')}" target="_blank" style="color: #38bdf8; text-decoration: none; display: flex; align-items: center; gap: 4px; font-size: 0.9rem;">
                <svg xmlns="http://www.w3.org/2007/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592" /></svg>
                ${candidato.telefone}
              </a>
              <span style="font-size: 0.8rem; color: #94a3b8;">${candidato.email}</span>
            </div>
          </td>
          <td>
            <div style="font-weight: 600;">${formatoReal.format(rentaBrt)}</div>
            <div style="font-size: 0.8rem; color: #94a3b8;">Tentiva: ${formatoReal.format(aluguel)}</div>
          </td>
          <td>
            <div style="display: flex; flex-direction: column; gap: 6px; align-items: flex-start;">
              ${badgeHtml}
              <span style="font-size: 0.8rem; color: #94a3b8;">Compromete ${percentualComprometido}%</span>
            </div>
          </td>
          <td>
            <button class="action-btn" title="Ver Detalhes (Em breve)">
              <svg xmlns="http://www.w3.org/2007/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // Update Dashboard Stats
      document.getElementById('totalCadastrados').textContent = dados.length;
      document.getElementById('totalAprovados').textContent = aprovados;
      document.getElementById('totalReprovados').textContent = reprovados;
    }

    async function carregarDados() {
      const loader = document.getElementById('loader');
      const tbody = document.getElementById('tableBody');
      
      tbody.innerHTML = '';
      loader.style.display = 'block';
      loader.textContent = 'Buscando lista de espera...';

      if(DEMO_MODE) {
        // Dados ficticios para demonstração de como fica a tela do ADMIN
        setTimeout(() => {
          const mockData = [
            {
              data_cadastro: "17/03/2026 09:12",
              nome_completo: "Catarina Silva Costa",
              cpf: "111.222.333-44",
              telefone: "(18) 98888-7777",
              email: "catarina@gmail.com",
              profissao: "Enfermeira",
              renda_bruta: "5500",
              valor_aluguel: "930" // Aprovada
            },
            {
              data_cadastro: "17/03/2026 09:45",
              nome_completo: "João Mendes Antunes",
              cpf: "444.555.666-77",
              telefone: "(18) 99999-1111",
              email: "joao.mendes@hotmail.com",
              profissao: "Auxiliar Administrativo",
              renda_bruta: "2200",
              valor_aluguel: "930" // Reprovado (Passa de 30% que é 660)
            },
            {
              data_cadastro: "17/03/2026 10:10",
              nome_completo: "Letícia Ribeiro",
              cpf: "222.333.444-55",
              telefone: "(18) 97777-5555",
              email: "leticia.rib@outlook.com",
              profissao: "Empresária",
              renda_bruta: "8000",
              valor_aluguel: "930" // Aprovada
            }
          ];
          renderizarTabela(mockData);
        }, 1000);
      } else {
        // Aqui é onde você fará o Fetch do Google Apps Script com GET!
        // try {
        //   const response = await fetch('COLE_SUA_URL_DO_APP_SCRIPT_AQUI');
        //   const json = await response.json();
        //   renderizarTabela(json.dados);
        // } catch (e) {
        //   loader.textContent = 'Erro ao carregar dados do servidor.';
        // }
      }
    }

    // Carregar dados na inicialização
    carregarDados();
  </script>
</body>
</html>
